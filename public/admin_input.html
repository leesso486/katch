    <script>
        let subQCount = 1;

        function toggleQType() {
            const qType = document.querySelector('input[name="q_type"]:checked').value;
            const btnAddSub = document.getElementById('add-sub-q-btn');
            
            // Handle Add Sub Question Button Visibility
            if(qType === 'multi') {
                btnAddSub.style.display = 'inline-block';
                // Show sub-question type selector for all blocks
                document.querySelectorAll('.sub-q-type-selector').forEach(el => el.style.display = 'block');
            } else {
                btnAddSub.style.display = 'none';
                // Hide sub-question type selector for all blocks
                document.querySelectorAll('.sub-q-type-selector').forEach(el => el.style.display = 'none');
                
                // Remove all additional questions if switching back to single/essay
                const container = document.getElementById('questions-container');
                while(container.children.length > 1) {
                    container.removeChild(container.lastChild);
                }
                subQCount = 1;
            }

            // If not multi, we force the first block to match the global type (mc or essay)
            if(qType !== 'multi') {
                const mcDiv = document.getElementById('mc-options-div-0');
                const essayDiv = document.getElementById('essay-options-div-0');
                if(qType === 'essay') {
                    if(mcDiv) mcDiv.style.display = 'none';
                    if(essayDiv) essayDiv.style.display = 'block';
                } else {
                    if(mcDiv) mcDiv.style.display = 'block';
                    if(essayDiv) essayDiv.style.display = 'none';
                }
            } else {
                // If it is multi, we rely on the individual block's radio buttons
                const firstBlockRadio = document.querySelector('input[name="sub_q_type_0"]:checked');
                if (firstBlockRadio) {
                    toggleSubQType(firstBlockRadio, 0);
                }
            }
        }

        function toggleSubQType(radioElem, idPrefix) {
            const val = radioElem.value;
            const mcDiv = document.getElementById('mc-options-div-' + idPrefix);
            const essayDiv = document.getElementById('essay-options-div-' + idPrefix);
            if(val === 'essay') {
                if(mcDiv) mcDiv.style.display = 'none';
                if(essayDiv) essayDiv.style.display = 'block';
            } else {
                if(mcDiv) mcDiv.style.display = 'block';
                if(essayDiv) essayDiv.style.display = 'none';
            }
        }

        function addSubQuestion() {
            subQCount++;
            const container = document.getElementById('questions-container');
            const newBlock = document.createElement('div');
            newBlock.className = 'q-input-block';
            newBlock.style = 'background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px dashed #bbb; margin-bottom: 20px; position:relative;';
            
            newBlock.innerHTML = `
                <button onclick="this.parentElement.remove()" class="btn-sm btn-outline-gray" style="position:absolute; top:10px; right:10px;"><i class="fas fa-times"></i> ?? ң</button>
                <div class="form-group">
                    <label>?ҳмң„ л¬ён•ӯ ${subQCount} л°ңл¬ё (Question Text)</label>
                    <input type="text" class="form-control" placeholder="?ҳмң„ л¬ён•ӯ??м§Ҳл¬ё???…л Ҙ?ҳм„ё??>
                </div>
                
                <div class="form-group sub-q-type-selector" style="background:#e8eaf6; padding:10px; border-radius:6px; margin-top:10px;">
                    <label style="font-size:13px; font-weight:bold; margin-bottom:5px;">?ҙлӢ№ л¬ён•ӯ???•нғң</label>
                    <div class="radio-group">
                        <label><input type="radio" name="sub_q_type_${subQCount}" value="mc" checked onclick="toggleSubQType(this, ${subQCount})"> к°қк???/label>
                        <label><input type="radio" name="sub_q_type_${subQCount}" value="essay" onclick="toggleSubQType(this, ${subQCount})"> ?ңмҲ ??/label>
                    </div>
                </div>

                <div class="choices-container mt-15" id="mc-options-div-${subQCount}">
                    <div class="choice-row">
                        <span class="choice-num">??/span>
                        <input type="text" class="form-control" placeholder="? нғқм§Җ 1лІ??ҙмҡ©">
                        <input type="radio" name="correct_ans_${subQCount}" value="1"> ?•лӢө
                    </div>
                     <div class="choice-row">
                        <span class="choice-num">??/span>
                        <input type="text" class="form-control" placeholder="? нғқм§Җ 2лІ??ҙмҡ©">
                        <input type="radio" name="correct_ans_${subQCount}" value="2">
                    </div>
                     <div class="choice-row">
                        <span class="choice-num">??/span>
                        <input type="text" class="form-control" placeholder="? нғқм§Җ 3лІ??ҙмҡ©">
                        <input type="radio" name="correct_ans_${subQCount}" value="3">
                    </div>
                     <div class="choice-row">
                        <span class="choice-num">??/span>
                        <input type="text" class="form-control" placeholder="? нғқм§Җ 4лІ??ҙмҡ©">
                        <input type="radio" name="correct_ans_${subQCount}" value="4">
                    </div>
                     <div class="choice-row">
                        <span class="choice-num">??/span>
                        <input type="text" class="form-control" placeholder="? нғқм§Җ 5лІ??ҙмҡ©">
                        <input type="radio" name="correct_ans_${subQCount}" value="5">
                    </div>
                </div>

                <div class="essay-container mt-15" id="essay-options-div-${subQCount}" style="display: none;">
                    <div class="form-group">
                        <label style="color:var(--navy);"><i class="fas fa-key"></i> ?өмӢ¬ мұ„м җ ?ӨмӣҢ??/label>
                        <input type="text" class="form-control" placeholder="?? ?Ғнҳё ?ҙн?мЈјмқҳ">
                    </div>
                    <div class="form-group">
                        <label class="text-orange"><i class="fas fa-check-double"></i> к°•мӮ¬??лӘЁлІ” ?өм•Ҳ</label>
                        <textarea class="form-control" rows="3" placeholder="лӘЁлІ” ?өм•Ҳ ?‘м„ұ"></textarea>
                    </div>
                </div>
            `;
            container.appendChild(newBlock);
        }
