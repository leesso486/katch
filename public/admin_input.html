<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>KATCH - 통합 문제입력기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sub.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .q-block { background: white; padding: 25px; border-radius: 12px; border: 2px solid #e0e4e8; margin-bottom: 20px; position: relative; transition: 0.3s; }
        .q-block:focus-within { border-color: var(--navy); box-shadow: 0 4px 20px rgba(26,35,126,0.1); }
        .q-number { position: absolute; top: -15px; left: 20px; background: var(--navy); color: white; padding: 5px 15px; border-radius: 20px; font-weight: 900; font-size: 16px; box-shadow: 0 4px 10px rgba(26,35,126,0.3); }
        .q-remove-btn { position: absolute; top: 15px; right: 20px; color: #f44336; background: none; border: none; font-size: 14px; cursor: pointer; font-weight: bold; }
        .q-remove-btn:hover { text-decoration: underline; }
        
        .sub-q-block { background: #f9f9f9; border: 1px dashed #ccc; padding: 20px; border-radius: 8px; margin-top: 15px; position: relative; }
        
        #add-test-q-btn { width: 100%; padding: 20px; background: transparent; border: 2px dashed #999; color: #666; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        #add-test-q-btn:hover { background: #f5f9ff; border-color: var(--navy); color: var(--navy); }
        
        /* Mode Toggle */
        .mode-toggle { display: flex; gap: 10px; background: #fff; border-radius: 12px; padding: 20px; border: 2px solid #e0e4e8; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); justify-content: center; }
        .mode-btn { flex: 1; padding: 15px; text-align: center; border-radius: 8px; border: 2px solid transparent; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; color: #666; background: #f5f6f8; }
        .mode-btn.active { color: white; border-color: var(--navy); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .mode-btn.active#btn-bank { background: #1a237e; border-color: #1a237e; }
        .mode-btn.active#btn-exam { background: #E91E63; border-color: #E91E63; }
        .mode-btn:hover:not(.active) { background: #eef2f5; }

        .form-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray">
    <!-- Admin Top Bar -->
    <header class="admin-header">
        <div class="logo">
            <h1>KATCH<span class="dot" style="color:#E91E63;">.</span> <span class="admin-badge">ADMIN</span></h1>
        </div>
        <div class="header-user">
            <span><strong>강사/관리자</strong> 님</span>
            <a href="/" class="btn-sm btn-outline-gray">메인으로 돌아가기</a>
        </div>
    </header>

    <div class="admin-layout">
        <!-- Sidebar Navigation -->
        <aside class="admin-sidebar">
            <ul class="admin-nav">
                <li><a href="dashboard_gvr.html"><i class="fas fa-home"></i> 대시보드</a></li>
                <li class="active"><a href="admin_input.html"><i class="fas fa-pencil-alt"></i> 통합 문제입력기</a></li>
                <li><a href="problem_bank.html"><i class="fas fa-folder-open"></i> 시험지/문제은행 조회</a></li>
                <li><a href="admin_report_template.html"><i class="fas fa-file-invoice"></i> 성적표 관리</a></li>
            </ul>
        </aside>

        <!-- Main Content (Unified Input Form) -->
        <main class="admin-main">
            <div class="admin-page-header flex-between mb-20">
                <h2 id="page-head-title">문제은행 문항 등록</h2>
                <div class="actions">
                    <button class="btn-outline-gray"><i class="fas fa-eye"></i> 미리보기</button>
                    <button class="btn-primary" id="btn-save" style="background:#1a237e; border-color:#1a237e;"><i class="fas fa-save"></i> 문제은행 DB에 저장</button>
                </div>
            </div>

            <!-- 1. Mode Selection -->
            <div class="mode-toggle">
                <div class="mode-btn active" id="btn-bank" onclick="switchMode('bank')">
                    <i class="fas fa-database mb-5" style="display:block; font-size:24px;"></i>
                    문제은행 단일 문항 등록<br><span style="font-size:12px; font-weight:500; opacity:0.8;">(개별 문항을 모아 아카이브화)</span>
                </div>
                <div class="mode-btn" id="btn-exam" onclick="switchMode('exam')">
                    <i class="fas fa-file-signature mb-5" style="display:block; font-size:24px;"></i>
                    신규 시험지 생성 + 문제 입력<br><span style="font-size:12px; font-weight:500; opacity:0.8;">(모의고사/진단평가 세팅 시)</span>
                </div>
            </div>

            <!-- 2. Exam Meta (Hidden under Bank Mode) -->
            <div id="exam-meta-box" class="form-card hidden mb-20">
                <h3 class="form-title text-pink"><i class="fas fa-file-alt"></i> 시험지 기본 정보 설정</h3>
                <div class="form-grid-3">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>시험지 제목 (Exam Name)</label>
                        <input type="text" class="form-control" placeholder="예: 2026학년도 예비고1 KATCH 모의고사 1회">
                    </div>
                    <div class="form-group">
                        <label>제한 시간 (분)</label>
                        <input type="number" class="form-control" value="60">
                    </div>
                </div>
                <div style="background:#fff3e0; padding:15px; border-radius:8px; border:1px solid #ffe0b2; margin-top:15px;">
                    <p style="margin:0; font-size:13.5px; color:#e65100; font-weight:800;">
                        <i class="fas fa-info-circle"></i> 아래에서 등록하는 모든 문항은 
                        1) 이 '시험지(세트)'에 일괄 배정되며, 
                        2) 개별 문항으로서 '문제은행 DB'에도 동시에 자동 등록됩니다.
                    </p>
                </div>
            </div>

            <div class="flex-between align-center mb-15">
                <h3 class="form-title mb-0" style="font-size: 18px;">문항 상세 입력</h3>
                <button class="btn-sm btn-primary hidden" id="btn-fetch-bank" onclick="alert('기출 문제은행 시스템에서 원하는 문항을 검색 및 다중 선택하여 현재 시험지에 추가합니다. (API 연동 구현 필요)')" style="background:#4CAF50; border-color:#4CAF50;"><i class="fas fa-download"></i> 기존 문제은행에서 불러오기</button>
            </div>

            <!-- Questions Container -->
            <div id="questions-container">
                <!-- Javascript will inject question blocks here -->
            </div>

            <button id="add-test-q-btn" onclick="addQuestion()"><i class="fas fa-plus"></i> 새 문항 (지문/블록) 추가하기</button>

            <!-- Submission Modals -->
            <div id="admin-modal" class="modal-overlay" style="display: none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
                <div style="background:white; padding:40px; border-radius:12px; text-align:center; width:360px;">
                    <i class="fas fa-check-circle text-green" style="font-size:48px; margin-bottom:15px;"></i>
                    <h3 style="font-size:22px; font-weight:bold; margin-bottom:10px;">저장 완료</h3>
                    <p style="color:#666; margin-bottom:25px;" id="modal-desc">1개의 문항이 문제은행에 등록되었습니다.</p>
                    <button class="btn-primary" onclick="document.getElementById('admin-modal').style.display='none'" style="width:100%; padding:14px; font-size:16px;">확인</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let qCount = 0;
        let pMode = 'bank'; 

        // Initial setup
        window.onload = () => {
            addQuestion();
            
            document.getElementById('btn-save').addEventListener('click', () => {
                if(qCount === 0) { alert('최소 1개 이상의 문항을 추가해야 합니다.'); return;}
                const desc = document.getElementById('modal-desc');
                if(pMode === 'bank') {
                    desc.innerHTML = `${qCount}개의 지문/문항 블록이<br><strong>문제은행 DB</strong>에 저장되었습니다.`;
                } else {
                    desc.innerHTML = `<strong>신규 시험지</strong>가 생성되었으며,<br>포함된 ${qCount}개의 신규 문항이<br>시험지 및 문제은행에 동시 배분되었습니다.`;
                }
                document.getElementById('admin-modal').style.display = 'flex';
            });
        };

        function switchMode(mode) {
            pMode = mode;
            const btnBank = document.getElementById('btn-bank');
            const btnExam = document.getElementById('btn-exam');
            const metaBox = document.getElementById('exam-meta-box');
            const btnSave = document.getElementById('btn-save');
            const btnFetch = document.getElementById('btn-fetch-bank');
            const title = document.getElementById('page-head-title');

            if(mode === 'exam') {
                btnBank.classList.remove('active');
                btnExam.classList.add('active');
                metaBox.classList.remove('hidden');
                btnFetch.classList.remove('hidden');
                title.textContent = "신규 시험/진단평가 등록";
                btnSave.innerHTML = '<i class="fas fa-file-export"></i> 시험지 발행 및 DB 반영';
                btnSave.style.background = '#E91E63'; btnSave.style.borderColor = '#E91E63';
            } else {
                btnExam.classList.remove('active');
                btnBank.classList.add('active');
                metaBox.classList.add('hidden');
                btnFetch.classList.add('hidden');
                title.textContent = "문제은행 문항 등록";
                btnSave.innerHTML = '<i class="fas fa-save"></i> 문제은행 DB에 저장';
                btnSave.style.background = '#1a237e'; btnSave.style.borderColor = '#1a237e';
            }
        }

        function addQuestion() {
            qCount++;
            const container = document.getElementById('questions-container');
            const block = document.createElement('div');
            block.className = 'q-block mt-20';
            block.id = `q-block-${qCount}`;
            
            block.innerHTML = `
                <div class="q-number">Q${qCount}</div>
                <button class="q-remove-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i> 문항 삭제</button>
                
                <!-- Category Grid (Very Detailed) -->
                <div class="form-group mb-20" style="background:#f4f6f9; padding:15px; border-radius:8px;">
                    <label style="color:var(--navy); font-size:14px; margin-bottom:10px;"><i class="fas fa-tags"></i> 카테고리 (Category Metadata)</label>
                    <div class="form-grid-4" style="font-size:13px;">
                        <div>
                            <span style="font-weight:700; color:#444; display:block; margin-bottom:4px;">학교/시험출처</span>
                            <select class="form-control" style="font-size:13px; height:36px; padding:0 8px;"><option>KNS 자체제작</option><option>단대부고</option><option>휘문고</option><option>수능/모평</option></select>
                        </div>
                        <div>
                            <span style="font-weight:700; color:#444; display:block; margin-bottom:4px;">대상 학년</span>
                            <select class="form-control" style="font-size:13px; height:36px; padding:0 8px;"><option>예비중1</option><option>중1/2/3</option><option>예비고1</option><option selected>고1/2/3/N수</option></select>
                        </div>
                        <div>
                            <span style="font-weight:700; color:#444; display:block; margin-bottom:4px;">영역 (파트)</span>
                            <select class="form-control" style="font-size:13px; height:36px; padding:0 8px;"><option>Reading (RC)</option><option>Listening (LC)</option><option>Grammar (GR)</option><option>Vocabulary (VO)</option></select>
                        </div>
                        <div>
                            <span style="font-weight:700; color:#444; display:block; margin-bottom:4px;">난이도</span>
                            <select class="form-control" style="font-size:13px; height:36px; padding:0 8px;"><option>Level 1 (기초)</option><option>Level 2 (중하)</option><option selected>Level 3 (중)</option><option>Level 4 (중상)</option><option>Level 5 (실전)</option><option>Killer (최상)</option></select>
                        </div>
                        <div style="grid-column: span 2;">
                            <span style="font-weight:700; color:#444; display:block; margin-bottom:4px;">세부 유형 (주제/빈칸/순서 등)</span>
                            <input type="text" class="form-control" placeholder="빈칸 추론, 순서 맞추기..." style="font-size:13px; height:36px; padding:0 8px;">
                        </div>
                        <div style="grid-column: span 2;">
                            <span style="font-weight:700; color:#444; display:block; margin-bottom:4px;">검색용 사용자 태그</span>
                            <input type="text" class="form-control" placeholder="e.g., 도치구문, 오답률상, 변형문제" style="font-size:13px; height:36px; padding:0 8px;">
                        </div>
                    </div>
                </div>

                <!-- Q Type Selector -->
                <div class="radio-group mb-15">
                    <span style="font-size:14px; font-weight:800; color:#222; margin-right:15px; align-self:center;">문항 형태:</span>
                    <label><input type="radio" name="eq_type_${qCount}" value="single" checked onclick="toggleType(${qCount})"> 객관식 (단일)</label>
                    <label><input type="radio" name="eq_type_${qCount}" value="essay" onclick="toggleType(${qCount})"> 서술형 (단일)</label>
                    <label><input type="radio" name="eq_type_${qCount}" value="multi" onclick="toggleType(${qCount})"> 다문항 (1지문 n형식)</label>
                </div>

                <div class="form-group mb-15">
                    <label>지문 (Passage) 및 기본 이미지 - <i>선택사항</i></label>
                    <div class="editor-toolbar" style="margin-bottom:5px; background:#f0f2f5; padding:5px; border-radius:4px;">
                        <button style="border:none; padding:5px 8px; cursor:pointer;"><i class="fas fa-bold"></i></button>
                        <button style="border:none; padding:5px 8px; cursor:pointer;"><i class="fas fa-image"></i> 이미지 삽입</button>
                    </div>
                    <textarea class="form-control" rows="4" placeholder="문항에 필요한 지문을 입력하세요 (다문항의 경우 공통 지문 역할)"></textarea>
                </div>

                <!-- Single / Essay Mode Container -->
                <div id="eq-single-container-${qCount}">
                    <div class="form-group mb-15">
                        <label>발문 (Question Text)</label>
                        <input type="text" class="form-control" placeholder="질문을 입력하세요">
                    </div>
                    
                    <div id="eq-mc-options-${qCount}" class="choices-container">
                        <div class="choice-row"><span class="choice-num">①</span><input type="text" class="form-control" placeholder="선지 1"><input type="radio" name="eq_ans_${qCount}" value="1"></div>
                        <div class="choice-row"><span class="choice-num">②</span><input type="text" class="form-control" placeholder="선지 2"><input type="radio" name="eq_ans_${qCount}" value="2"></div>
                        <div class="choice-row"><span class="choice-num">③</span><input type="text" class="form-control" placeholder="선지 3"><input type="radio" name="eq_ans_${qCount}" value="3" checked></div>
                        <div class="choice-row"><span class="choice-num">④</span><input type="text" class="form-control" placeholder="선지 4"><input type="radio" name="eq_ans_${qCount}" value="4"></div>
                        <div class="choice-row"><span class="choice-num">⑤</span><input type="text" class="form-control" placeholder="선지 5"><input type="radio" name="eq_ans_${qCount}" value="5"></div>
                    </div>

                    <div id="eq-essay-options-${qCount}" class="essay-container" style="display:none; background:#fff9e6; padding:15px; border-radius:8px; border:1px solid #ffe0b2;">
                        <div class="form-group mb-10">
                            <label style="color:var(--navy);"><i class="fas fa-key"></i> 핵심 채점 키워드</label>
                            <input type="text" class="form-control" placeholder="예: 상호 이타주의">
                        </div>
                        <div class="form-group mb-0">
                            <label class="text-orange"><i class="fas fa-check-double"></i> 강사의 모범 답안 (Rubric)</label>
                            <textarea class="form-control" rows="2" placeholder="채점자 및 학생 성적표에 표시될 모범 답안 작성"></textarea>
                        </div>
                    </div>
                </div>

                <!-- Multi Mode Container -->
                <div id="eq-multi-container-${qCount}" style="display:none; border-top:2px dashed #eee; padding-top:15px;">
                    <div style="background:#e8eaf6; padding:12px; border-radius:8px; display:inline-block; font-size:13px; font-weight:800; color:#3949ab; margin-bottom:15px;">
                        <i class="fas fa-info-circle"></i> 하나의 공통 지문을 바탕으로 여러 개의 하위 질문을 생성합니다.
                    </div><br>
                    <button class="btn-sm btn-outline-gray mb-15" onclick="addSubQ(${qCount})"><i class="fas fa-plus"></i> 하위 문항 (Question #${qCount}-x) 추가하기</button>
                    <div id="eq-sub-qs-${qCount}">
                        <!-- Sub questions will be added here -->
                    </div>
                </div>

                <!-- Explanation Area -->
                <div class="form-group mt-20">
                    <label><i class="fas fa-comment-dots"></i> 해설 (선택사항)</label>
                    <textarea class="form-control" rows="3" placeholder="오답 노트 등에 표시될 상세 해설을 입력하세요."></textarea>
                </div>
            `;
            container.appendChild(block);

            // Add at least one sub-q for multi-mode invisibly
            addSubQ(qCount);
        }

        function toggleType(qId) {
            const typeNode = document.querySelector(`input[name="eq_type_${qId}"]:checked`);
            if(!typeNode) return;
            const type = typeNode.value;
            const singleContainer = document.getElementById(`eq-single-container-${qId}`);
            const multiContainer = document.getElementById(`eq-multi-container-${qId}`);
            const mcOptions = document.getElementById(`eq-mc-options-${qId}`);
            const essayOptions = document.getElementById(`eq-essay-options-${qId}`);

            if (type === 'multi') {
                singleContainer.style.display = 'none';
                multiContainer.style.display = 'block';
            } else {
                singleContainer.style.display = 'block';
                multiContainer.style.display = 'none';
                if (type === 'essay') {
                    if(mcOptions) mcOptions.style.display = 'none';
                    if(essayOptions) essayOptions.style.display = 'block';
                } else {
                    if(mcOptions) mcOptions.style.display = 'block';
                    if(essayOptions) essayOptions.style.display = 'none';
                }
            }
        }

        function addSubQ(qId) {
            const container = document.getElementById(`eq-sub-qs-${qId}`);
            if(!container) return;
            const subCount = container.children.length + 1;
            const subId = `${qId}_${subCount}`;

            const subBlock = document.createElement('div');
            subBlock.className = 'sub-q-block';
            subBlock.innerHTML = `
                <button onclick="this.parentElement.remove()" class="btn-sm btn-outline-gray" style="position:absolute; top:15px; right:15px;"><i class="fas fa-times"></i> 삭제</button>
                <div class="form-group mb-10">
                    <label>하위 문항 분리번호 ${qId}-${subCount} 발문</label>
                    <input type="text" class="form-control" placeholder="세부 질문을 입력하세요">
                </div>
                
                <div class="radio-group mb-15" style="background:#e8eaf6; padding:10px; border-radius:6px;">
                    <label style="font-size:13px; font-weight:bold; margin-right:10px;">문항 형태</label>
                    <label><input type="radio" name="eq_sub_type_${subId}" value="mc" checked onclick="toggleSubQType('${subId}')"> 객관식</label>
                    <label><input type="radio" name="eq_sub_type_${subId}" value="essay" onclick="toggleSubQType('${subId}')"> 서술형</label>
                </div>

                <div id="eq-sub-mc-${subId}" class="choices-container">
                    <div class="choice-row"><span class="choice-num">①</span><input type="text" class="form-control" placeholder="선지 1"><input type="radio" name="eq_sub_ans_${subId}" value="1"></div>
                    <div class="choice-row"><span class="choice-num">②</span><input type="text" class="form-control" placeholder="선지 2"><input type="radio" name="eq_sub_ans_${subId}" value="2"></div>
                    <div class="choice-row"><span class="choice-num">③</span><input type="text" class="form-control" placeholder="선지 3"><input type="radio" name="eq_sub_ans_${subId}" value="3" checked></div>
                    <div class="choice-row"><span class="choice-num">④</span><input type="text" class="form-control" placeholder="선지 4"><input type="radio" name="eq_sub_ans_${subId}" value="4"></div>
                    <div class="choice-row"><span class="choice-num">⑤</span><input type="text" class="form-control" placeholder="선지 5"><input type="radio" name="eq_sub_ans_${subId}" value="5"></div>
                </div>

                <div id="eq-sub-essay-${subId}" class="essay-container" style="display:none; background:#fff; padding:15px; border-radius:8px; border:1px solid #ddd;">
                    <div class="form-group mb-10">
                        <label style="color:var(--navy);"><i class="fas fa-key"></i> 핵심 채점 키워드</label>
                        <input type="text" class="form-control" placeholder="예: 상호 이타주의">
                    </div>
                    <div class="form-group mb-0">
                        <label class="text-orange"><i class="fas fa-check-double"></i> 강사의 모범 답안</label>
                        <textarea class="form-control" rows="2" placeholder="모범 답안 작성"></textarea>
                    </div>
                </div>
            `;
            container.appendChild(subBlock);
        }

        function toggleSubQType(subId) {
            const typeNode = document.querySelector(`input[name="eq_sub_type_${subId}"]:checked`);
            if(!typeNode) return;
            const type = typeNode.value;
            const mcOptions = document.getElementById(`eq-sub-mc-${subId}`);
            const essayOptions = document.getElementById(`eq-sub-essay-${subId}`);
            
            if (type === 'essay') {
                if(mcOptions) mcOptions.style.display = 'none';
                if(essayOptions) essayOptions.style.display = 'block';
            } else {
                if(mcOptions) mcOptions.style.display = 'block';
                if(essayOptions) essayOptions.style.display = 'none';
            }
        }
    </script>
</body>
</html>
