    <script>
        let subQCount = 1;

        function toggleQType() {
            const qType = document.querySelector('input[name="q_type"]:checked').value;
            const btnAddSub = document.getElementById('add-sub-q-btn');
            
            // Handle Add Sub Question Button Visibility
            if(qType === 'multi') {
                btnAddSub.style.display = 'inline-block';
                // Show sub-question type selector for all blocks
                document.querySelectorAll('.sub-q-type-selector').forEach(el => el.style.display = 'block');
            } else {
                btnAddSub.style.display = 'none';
                // Hide sub-question type selector for all blocks
                document.querySelectorAll('.sub-q-type-selector').forEach(el => el.style.display = 'none');
                
                // Remove all additional questions if switching back to single/essay
                const container = document.getElementById('questions-container');
                while(container.children.length > 1) {
                    container.removeChild(container.lastChild);
                }
                subQCount = 1;
            }

            // If not multi, we force the first block to match the global type (mc or essay)
            if(qType !== 'multi') {
                const mcDiv = document.getElementById('mc-options-div-0');
                const essayDiv = document.getElementById('essay-options-div-0');
                if(qType === 'essay') {
                    if(mcDiv) mcDiv.style.display = 'none';
                    if(essayDiv) essayDiv.style.display = 'block';
                } else {
                    if(mcDiv) mcDiv.style.display = 'block';
                    if(essayDiv) essayDiv.style.display = 'none';
                }
            } else {
                // If it is multi, we rely on the individual block's radio buttons
                const firstBlockRadio = document.querySelector('input[name="sub_q_type_0"]:checked');
                if (firstBlockRadio) {
                    toggleSubQType(firstBlockRadio, 0);
                }
            }
        }

        function toggleSubQType(radioElem, idPrefix) {
            const val = radioElem.value;
            const mcDiv = document.getElementById('mc-options-div-' + idPrefix);
            const essayDiv = document.getElementById('essay-options-div-' + idPrefix);
            if(val === 'essay') {
                if(mcDiv) mcDiv.style.display = 'none';
                if(essayDiv) essayDiv.style.display = 'block';
            } else {
                if(mcDiv) mcDiv.style.display = 'block';
                if(essayDiv) essayDiv.style.display = 'none';
            }
        }

        const CHOICE_LABELS = {
            'gvr': ['a', 'b', 'c', 'd'],
            'mt': ['①', '②', '③', '④', '⑤'],
            'sc': ['A', 'B', 'C', 'D', 'E', 'F']
        };
        let currentTestType = 'gvr';

        function changeGlobalTestType(val) {
            currentTestType = val;
            for(let i=0; i<=subQCount; i++) {
                renderChoices(i);
            }
        }

        function renderChoices(idPrefix) {
            const mcDiv = document.getElementById('mc-options-div-' + idPrefix);
            if(!mcDiv) return;
            
            const labels = CHOICE_LABELS[currentTestType];
            let html = '';
            labels.forEach((t, index) => {
                const val = index + 1;
                html += `
                <div class="choice-row">
                    <span class="choice-num" style="min-width:30px; text-align:center; font-weight:bold;">${t}</span>
                    <input type="text" class="form-control" placeholder="선택지 ${val}번 내용">
                    <input type="radio" name="correct_ans_${idPrefix}" value="${val}" ${index===0 ? 'title="정답 지정"' : ''} ${index===2 ? 'checked' : ''}> ${index===0 ? '정답' : ''}
                </div>
                `;
            });
            mcDiv.innerHTML = html;
        }

        // Initialize first block choices on load
        document.addEventListener('DOMContentLoaded', () => {
            renderChoices(0);
        });

        function addSubQuestion() {
            subQCount++;
            const container = document.getElementById('questions-container');
            const newBlock = document.createElement('div');
            newBlock.className = 'q-input-block';
            newBlock.style = 'background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px dashed #bbb; margin-bottom: 20px; position:relative;';
            
            newBlock.innerHTML = `
                <button onclick="this.parentElement.remove()" class="btn-sm btn-outline-gray" style="position:absolute; top:10px; right:10px;"><i class="fas fa-times"></i> 삭제</button>
                <div class="form-group">
                    <label>하위 문항 ${subQCount} 발문 (Question Text)</label>
                    <input type="text" class="form-control" placeholder="하위 문항의 질문을 입력하세요">
                </div>
                
                <div class="form-group sub-q-type-selector" style="background:#e8eaf6; padding:10px; border-radius:6px; margin-top:10px;">
                    <label style="font-size:13px; font-weight:bold; margin-bottom:5px;">해당 문항의 형태</label>
                    <div class="radio-group">
                        <label><input type="radio" name="sub_q_type_${subQCount}" value="mc" checked onclick="toggleSubQType(this, ${subQCount})"> 객관식</label>
                        <label><input type="radio" name="sub_q_type_${subQCount}" value="essay" onclick="toggleSubQType(this, ${subQCount})"> 서술형</label>
                    </div>
                </div>

                <div class="choices-container mt-15" id="mc-options-div-${subQCount}">
                    <!-- Choices dynamically rendered by JS -->
                </div>

                <div class="essay-container mt-15" id="essay-options-div-${subQCount}" style="display: none;">
                    <div class="form-group">
                        <label style="color:var(--navy);"><i class="fas fa-key"></i> 핵심 채점 키워드</label>
                        <input type="text" class="form-control" placeholder="예: 상호 이타주의">
                    </div>
                    <div class="form-group">
                        <label class="text-orange"><i class="fas fa-check-double"></i> 강사의 모범 답안</label>
                        <textarea class="form-control" rows="3" placeholder="모범 답안 작성"></textarea>
                    </div>
                </div>
            `;
            container.appendChild(newBlock);
            renderChoices(subQCount);
        }
    </script>
</body>
</html>
