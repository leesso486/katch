<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>KATCH - 관리자 문제 입력기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sub.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray">
    <!-- Admin Top Bar -->
    <header class="admin-header">
        <div class="logo">
            <h1>KATCH<span class="dot" style="color:#E91E63;">.</span> <span class="admin-badge">ADMIN</span></h1>
        </div>
        <div class="header-user">
            <span><strong>최고관리자 (전과목)</strong> 님</span>
            <a href="/" class="btn-sm btn-outline-gray">메인으로 돌아가기</a>
        </div>
    </header>

    <div class="admin-layout">
        <!-- Sidebar Navigation -->
        <aside class="admin-sidebar">
            <ul class="admin-nav">
                <li><a href="dashboard_gvr.html"><i class="fas fa-home"></i> 대시보드</a></li>
                <li class="active"><a href="admin_input.html"><i class="fas fa-pencil-alt"></i> 문제은행 입력기</a></li>
                <li><a href="admin_exam_input.html"><i class="fas fa-file-signature"></i> 시험문제 입력기</a></li>
                <li><a href="problem_bank.html"><i class="fas fa-folder-open"></i> 시험지(세트) 빌더</a></li>
                <li><a href="dashboard_gvr.html"><i class="fas fa-users"></i> 학생·성적 관리</a></li>
                <li><a href="admin_report_template.html"><i class="fas fa-file-invoice"></i> 성적표 템플릿 관리</a></li>
                <li><a href="dashboard_gvr.html"><i class="fas fa-chart-pie"></i> 통계 및 로그 조회</a></li>
            </ul>
        </aside>

        <!-- Main Content (Input Form) -->
        <main class="admin-main">
            <div class="admin-page-header flex-between">
                <h2>새 문제 등록</h2>
                <div class="actions" style="display:flex; align-items:center; gap:10px;">
                    <a href="admin_report_template.html" class="btn-sm" style="background:#fff3e0; color:#e65100; border:1px solid #ffe0b2; padding:8px 15px; font-weight:bold; text-decoration:none;"><i class="fas fa-magic"></i> 성적표 템플릿 수정(에디터) 바로가기</a>
                    <button class="btn-outline-gray"><i class="fas fa-eye"></i> 미리보기</button>
                    <button class="btn-primary" style="background:var(--navy); border-color:var(--navy);"><i class="fas fa-save"></i> DB에 저장하기</button>
                </div>
            </div>

            <div class="form-card">
                <!-- Meta Info -->
                <div class="form-section">
                    <h3 class="form-title">1. 문제 분류 (메타 데이터)</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>대상 학년</label>
                            <select class="form-control">
                                <option>초등 / 예비중</option>
                                <option>중1</option>
                                <option>중2</option>
                                <option>중3</option>
                                <option selected>고등 수능공통</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>테스트 종류 (문항 형태)</label>
                            <select class="form-control" id="test-type-select" onchange="changeGlobalTestType(this.value)">
                                <option value="gvr" selected>GVR (a~d 4지선다)</option>
                                <option value="mt">MT (①~⑤ 5지선다)</option>
                                <option value="sc">SC (A~F 6지선다)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>영역 (파트)</label>
                            <select class="form-control">
                                <option selected>독해 (Reading)</option>
                                <option>문법 (Grammar)</option>
                                <option>듣기 (Listening)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>세부 유형</label>
                            <select class="form-control">
                                <option>주제/요지 찾기</option>
                                <option selected>빈칸 추론</option>
                                <option>순서 삽입</option>
                                <option>어법성 판단</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>난이도</label>
                            <div class="radio-group">
                                <label><input type="radio" name="diff"> 하</label>
                                <label><input type="radio" name="diff"> 중</label>
                                <label><input type="radio" name="diff" checked> 상</label>
                                <label><input type="radio" name="diff"> 최상 (킬러)</label>
                            </div>
                        </div>
                    </div>
                    <div class="form-group mt-20" style="background:#f4f6f9; padding: 20px; border-radius:8px;">
                        <label style="color:var(--navy); font-weight:800; font-size:16px;"><i class="fas fa-layer-group"></i> 문항 형태 (Question Type)</label>
                        <div class="radio-group" style="margin-top:10px;">
                            <label><input type="radio" name="q_type" value="single" checked onclick="toggleQType()"> 단일형 (1지문 1문항)</label>
                            <label><input type="radio" name="q_type" value="multi" onclick="toggleQType()"> 세트형 (1지문 다문항)</label>
                            <label><input type="radio" name="q_type" value="essay" onclick="toggleQType()"> 서술형 (주관식/단답형)</label>
                        </div>
                    </div>
                </div>

                <hr class="form-divider">

                <!-- Passage Editor -->
                <div class="form-section">
                    <h3 class="form-title">2. 지문 (Passage) 입력</h3>
                    <div class="form-group">
                        <div class="editor-toolbar">
                            <button><i class="fas fa-bold"></i></button>
                            <button><i class="fas fa-italic"></i></button>
                            <button><i class="fas fa-underline"></i></button>
                            <span class="toolbar-sep">|</span>
                            <button><i class="fas fa-align-left"></i></button>
                            <button><i class="fas fa-align-justify"></i></button>
                            <span class="toolbar-sep">|</span>
                            <button><i class="fas fa-image"></i> 이미지 삽입</button>
                        </div>
                        <textarea class="form-control" rows="8" placeholder="영어 지문을 입력하세요..."></textarea>
                    </div>
                </div>

                <hr class="form-divider">

                <!-- Question Editor -->
                <div class="form-section">
                    <div class="flex-between align-center mb-15">
                        <h3 class="form-title mb-0">3. 발문 및 선택지/답안 입력</h3>
                        <button id="add-sub-q-btn" class="btn-sm" style="display:none; background:var(--navy); color:white; border:none;" onclick="addSubQuestion()"><i class="fas fa-plus"></i> 하위 문항 추가 (+)</button>
                    </div>
                    
                    <div id="questions-container">
                        <!-- Default Single Question Block -->
                        <div class="q-input-block" style="background: #fcfcfc; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px;">
                            <div class="form-group">
                                <label>발문 (Question Text)</label>
                                <input type="text" class="form-control" value="다음 빈칸에 들어갈 말로 가장 적절한 것은?">
                            </div>
                            
                            <!-- Question Type Selector (Visible for Multi) -->
                            <div class="form-group sub-q-type-selector" style="display:none; background:#e8eaf6; padding:10px; border-radius:6px; margin-top:10px;">
                                <label style="font-size:13px; font-weight:bold; margin-bottom:5px;">해당 문항의 형태</label>
                                <div class="radio-group">
                                    <label><input type="radio" name="sub_q_type_0" value="mc" checked onclick="toggleSubQType(this, 0)"> 객관식</label>
                                    <label><input type="radio" name="sub_q_type_0" value="essay" onclick="toggleSubQType(this, 0)"> 서술형</label>
                                </div>
                            </div>
                            
                            <!-- Multiple Choice Options (Visible by Default) -->
                            <div class="choices-container mt-15" id="mc-options-div-0">
                                <!-- Choices dynamically rendered by JS -->
                            </div>

                            <!-- Essay Options (Hidden by Default) -->
                            <div class="essay-container mt-15" id="essay-options-div-0" style="display: none;">
                                <div class="form-group">
                                    <label style="color:var(--navy);"><i class="fas fa-key"></i> 핵심 채점 키워드 (AI 1차 판독 기준)</label>
                                    <input type="text" class="form-control" placeholder="예: 상호 이타주의, 개체 구별, 과거 기억">
                                </div>
                                <div class="form-group">
                                    <label class="text-orange"><i class="fas fa-check-double"></i> 강사의 모범 답안 (Rubric)</label>
                                    <textarea class="form-control" rows="3" placeholder="만점을 받을 수 있는 모범 답안을 작성하세요. 평가 페이지에도 노출됩니다."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <hr class="form-divider">

                <!-- Distribution Settings -->
                <div class="form-section">
                    <h3 class="form-title text-orange"><i class="fas fa-share-alt"></i> 4. 문항 배포 및 동시 등록 설정</h3>
                    <div class="form-group" style="background:#fff3e0; padding:15px; border-radius:8px; border:1px solid #ffe0b2;">
                        <label class="d-block mb-10"><input type="checkbox" checked> <strong>[진단테스트 전용]</strong> 특정 진단테스트 풀(Pool)에 추가합니다.</label>
                        <select class="form-control" style="width: 300px; margin-left: 25px; margin-bottom:15px;">
                            <option>예비고1 특목고 배치고사</option>
                            <option>예비중3 Hello 내신</option>
                            <option>예비중1 Real 특목</option>
                        </select>
                        
                        <label class="d-block"><input type="checkbox" checked> <strong>[통합 문제은행 노출]</strong> 일반 강사 및 학원(KNS Test Prep)이 열람/구매할 수 있는 전체 문제은행 DB에 동시 등록합니다. (수익화 옵션)</label>
                    </div>
                </div>

                <hr class="form-divider">

                <!-- Explanation / Tags -->
                <div class="form-section">
                    <h3 class="form-title">5. 해설 및 태그</h3>
                    <div class="form-group">
                        <label>상세 해설 및 오답 노트</label>
                        <textarea class="form-control" rows="4" placeholder="학생들에게 보여질 정답 도출 과정을 입력하세요."></textarea>
                    </div>
                    <div class="form-group">
                        <label>검색용 태그 (Tag)</label>
                        <input type="text" class="form-control" placeholder="예: 2024년 3월모의고사, 대원외고기출, 오답률상">
                        <p class="help-text">쉼표(,)로 구분하여 입력하세요.</p>
                    </div>
                </div>
                
                <div class="form-footer text-center mt-30">
                    <button class="btn-primary" style="padding:15px 40px; font-size:16px; background:#E91E63; border-color:#E91E63;"><i class="fas fa-save"></i> 문제 스토어에 등록</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let subQCount = 1;

        function toggleQType() {
            const qType = document.querySelector('input[name="q_type"]:checked').value;
            const btnAddSub = document.getElementById('add-sub-q-btn');
            
            // Handle Add Sub Question Button Visibility
            if(qType === 'multi') {
                btnAddSub.style.display = 'inline-block';
                // Show sub-question type selector for all blocks
                document.querySelectorAll('.sub-q-type-selector').forEach(el => el.style.display = 'block');
            } else {
                btnAddSub.style.display = 'none';
                // Hide sub-question type selector for all blocks
                document.querySelectorAll('.sub-q-type-selector').forEach(el => el.style.display = 'none');
                
                // Remove all additional questions if switching back to single/essay
                const container = document.getElementById('questions-container');
                while(container.children.length > 1) {
                    container.removeChild(container.lastChild);
                }
                subQCount = 1;
            }

            // If not multi, we force the first block to match the global type (mc or essay)
            if(qType !== 'multi') {
                const mcDiv = document.getElementById('mc-options-div-0');
                const essayDiv = document.getElementById('essay-options-div-0');
                if(qType === 'essay') {
                    if(mcDiv) mcDiv.style.display = 'none';
                    if(essayDiv) essayDiv.style.display = 'block';
                } else {
                    if(mcDiv) mcDiv.style.display = 'block';
                    if(essayDiv) essayDiv.style.display = 'none';
                }
            } else {
                // If it is multi, we rely on the individual block's radio buttons
                const firstBlockRadio = document.querySelector('input[name="sub_q_type_0"]:checked');
                if (firstBlockRadio) {
                    toggleSubQType(firstBlockRadio, 0);
                }
            }
        }

        function toggleSubQType(radioElem, idPrefix) {
            const val = radioElem.value;
            const mcDiv = document.getElementById('mc-options-div-' + idPrefix);
            const essayDiv = document.getElementById('essay-options-div-' + idPrefix);
            if(val === 'essay') {
                if(mcDiv) mcDiv.style.display = 'none';
                if(essayDiv) essayDiv.style.display = 'block';
            } else {
                if(mcDiv) mcDiv.style.display = 'block';
                if(essayDiv) essayDiv.style.display = 'none';
            }
        }

        const CHOICE_LABELS = {
            'gvr': ['a', 'b', 'c', 'd'],
            'mt': ['①', '②', '③', '④', '⑤'],
            'sc': ['A', 'B', 'C', 'D', 'E', 'F']
        };
        let currentTestType = 'gvr';

        function changeGlobalTestType(val) {
            currentTestType = val;
            for(let i=0; i<=subQCount; i++) {
                renderChoices(i);
            }
        }

        function renderChoices(idPrefix) {
            const mcDiv = document.getElementById('mc-options-div-' + idPrefix);
            if(!mcDiv) return;
            
            const labels = CHOICE_LABELS[currentTestType];
            let html = '';
            labels.forEach((t, index) => {
                const val = index + 1;
                html += `
                <div class="choice-row">
                    <span class="choice-num" style="min-width:30px; text-align:center; font-weight:bold;">${t}</span>
                    <input type="text" class="form-control" placeholder="선택지 ${val}번 내용">
                    <input type="radio" name="correct_ans_${idPrefix}" value="${val}" ${index===0 ? 'title="정답 지정"' : ''} ${index===2 ? 'checked' : ''}> ${index===0 ? '정답' : ''}
                </div>
                `;
            });
            mcDiv.innerHTML = html;
        }

        // Initialize first block choices on load
        document.addEventListener('DOMContentLoaded', () => {
            renderChoices(0);
        });

        function addSubQuestion() {
            subQCount++;
            const container = document.getElementById('questions-container');
            const newBlock = document.createElement('div');
            newBlock.className = 'q-input-block';
            newBlock.style = 'background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px dashed #bbb; margin-bottom: 20px; position:relative;';
            
            newBlock.innerHTML = `
                <button onclick="this.parentElement.remove()" class="btn-sm btn-outline-gray" style="position:absolute; top:10px; right:10px;"><i class="fas fa-times"></i> 삭제</button>
                <div class="form-group">
                    <label>하위 문항 ${subQCount} 발문 (Question Text)</label>
                    <input type="text" class="form-control" placeholder="하위 문항의 질문을 입력하세요">
                </div>
                
                <div class="form-group sub-q-type-selector" style="background:#e8eaf6; padding:10px; border-radius:6px; margin-top:10px;">
                    <label style="font-size:13px; font-weight:bold; margin-bottom:5px;">해당 문항의 형태</label>
                    <div class="radio-group">
                        <label><input type="radio" name="sub_q_type_${subQCount}" value="mc" checked onclick="toggleSubQType(this, ${subQCount})"> 객관식</label>
                        <label><input type="radio" name="sub_q_type_${subQCount}" value="essay" onclick="toggleSubQType(this, ${subQCount})"> 서술형</label>
                    </div>
                </div>

                <div class="choices-container mt-15" id="mc-options-div-${subQCount}">
                    <!-- Choices dynamically rendered by JS -->
                </div>

                <div class="essay-container mt-15" id="essay-options-div-${subQCount}" style="display: none;">
                    <div class="form-group">
                        <label style="color:var(--navy);"><i class="fas fa-key"></i> 핵심 채점 키워드</label>
                        <input type="text" class="form-control" placeholder="예: 상호 이타주의">
                    </div>
                    <div class="form-group">
                        <label class="text-orange"><i class="fas fa-check-double"></i> 강사의 모범 답안</label>
                        <textarea class="form-control" rows="3" placeholder="모범 답안 작성"></textarea>
                    </div>
                </div>
            `;
            container.appendChild(newBlock);
            renderChoices(subQCount);
        }
    </script>
</body>
</html>
