    <script>
        // Hero Banner Rolling Logic
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot-nav');
        let currentSlide = 0;

        function showSlide(n) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            currentSlide = (n + slides.length) % slides.length;
            
            // Re-trigger animation by playing with display/opacity
            slides[currentSlide].style.display = 'flex';
            setTimeout(() => {
                slides[currentSlide].classList.add('active');
            }, 10);
            
            dots[currentSlide].classList.add('active');
            
            // Hide others after transition
            slides.forEach((s, idx) => {
                if(idx !== currentSlide) {
                    setTimeout(() => { s.style.display = 'none'; }, 500);
                }
            });
        }

        // Auto roll every 4 seconds
        setInterval(() => {
            showSlide(currentSlide + 1);
        }, 4000);

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => showSlide(index));
        });

        // Commerce Tabs Logic
        const tabs = document.querySelectorAll('.c-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                // Could add logic to filter products here
            });
        });

        // FAQ Accordion
        function toggleFaq(headerEl) {
            const body = headerEl.nextElementSibling;
            const chev = headerEl.querySelector('.faq-chev');
            const isOpen = body.style.display !== 'none';
            body.style.display = isOpen ? 'none' : 'block';
            if (chev) chev.style.transform = isOpen ? '' : 'rotate(180deg)';
        }

        // Counter Animation (Intersection Observer)
        const counters = document.querySelectorAll('.counter');
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const el = entry.target;
                    const target = parseInt(el.getAttribute('data-target'));
                    const duration = 1800;
                    const step = target / (duration / 16);
                    let current = 0;
                    const timer = setInterval(() => {
                        current += step;
                        if (current >= target) {
                            el.textContent = target.toLocaleString();
                            clearInterval(timer);
                        } else {
                            el.textContent = Math.floor(current).toLocaleString();
                        }
                    }, 16);
                    obs.unobserve(el);
                }
            });
        }, { threshold: 0.3 });
        counters.forEach(c => obs.observe(c));
    </script>
