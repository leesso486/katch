    <!-- Script for Charts -->
    <script>
        // New Feature: Student List Toggle
        window.toggleStudentList = function(btn) {
            const list = btn.nextElementSibling;
            if (list.style.display === 'none') {
                list.style.display = 'block';
                btn.textContent = '?リ린';
            } else {
                list.style.display = 'none';
                btn.textContent = '?ㅻ떟??蹂닿린';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Register DataLabels
            Chart.register(ChartDataLabels);

            // Generate 42 Dummy Questions
            window.allQuestions = [];
            for(let i=1; i<=42; i++) {
                let type = 'RC';
                let er = Math.floor(Math.random() * 80) + 10;
                if(i <= 12) { type = 'GR'; er = Math.floor(Math.random() * 60) + 20; }
                else if(i <= 20) { type = 'VO'; er = Math.floor(Math.random() * 50) + 10; }
                
                window.allQuestions.push({
                    qNum: 'Q' + i,
                    type: type,
                    er: er,
                    stCount: Math.ceil(er * 0.45) // Approx count
                });
            }

            // Global Chart Instance
            window.erChartInstance = null;
            window.currentSort = 'num'; // 'num' or 'er'

            window.renderErrorChart = function(typeFilter) {
                let filtered = window.allQuestions;
                if(typeFilter !== 'ALL') {
                    filtered = window.allQuestions.filter(q => q.type === typeFilter);
                }

                if(window.currentSort === 'er') {
                    filtered.sort((a,b) => b.er - a.er);
                } else {
                    // original order
                    filtered.sort((a,b) => parseInt(a.qNum.replace('Q','')) - parseInt(b.qNum.replace('Q','')));
                }

                const labels = filtered.map(q => q.qNum);
                const dataEr = filtered.map(q => q.er);
                const dataCt = filtered.map(q => q.stCount);
                const bgColors = filtered.map(q => q.type === 'GR' ? '#A0D468' : q.type === 'VO' ? '#4A89DC' : '#37BC9B');
                
                // Adjust container width based on items length
                document.getElementById('chart-width-container').style.width = Math.max(800, labels.length * 35) + 'px';

                if(window.erChartInstance) {
                    window.erChartInstance.destroy();
                }

                const ctx = document.getElementById('errorRateChart').getContext('2d');
                window.erChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '?ㅻ떟瑜?(%)',
                            data: dataEr,
                            backgroundColor: bgColors,
                            borderRadius: 4,
                            hoverBackgroundColor: '#E91E63',
                            barPercentage: 0.8
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        layout: { padding: { top: 25 } },
                        plugins: { 
                            legend: { display: false },
                            datalabels: {
                                color: '#111',
                                anchor: 'end',
                                align: 'top',
                                offset: 2,
                                formatter: function(value, context) {
                                    return value + '%\\n(' + dataCt[context.dataIndex] + '紐?';
                                },
                                font: { size: 10, weight: 'bold' },
                                textAlign: 'center'
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const index = context.dataIndex;
                                        return `?ㅻ떟瑜? ${dataEr[index]}% (${dataCt[index]}紐??由?`;
                                    },
                                    title: function(context) {
                                        const index = context[0].dataIndex;
                                        return `${labels[index]} [${filtered[index].type} 臾명빆]`;
                                    }
                                }
                            }
                        },
                        scales: { 
                            y: { min: 0, max: 100, title: { display: true, text: '?ㅻ떟瑜?(%)', font:{size:11, color:'#888'} } },
                            x: { grid: { display: false }, ticks: { font: {size:11} } }
                        },
                        onClick: (e, activeEls) => {
                            if (activeEls.length > 0) {
                                const dataIndex = activeEls[0].index;
                                const qName = labels[dataIndex];
                                const er = dataEr[dataIndex];
                                const type = filtered[dataIndex].type;
                                
                                document.getElementById('selected-q-title').textContent = qName;
                                document.getElementById('selected-q-name').textContent = `${qName} (${type})`;
                                document.getElementById('selected-q-er').textContent = `?ㅻ떟瑜?${er}%`;
                                
                                const container = document.getElementById('q-detail-container');
                                container.style.transition = '0.3s';
                                container.style.opacity = '0.5';
                                requestAnimationFrame(() => {
                                    setTimeout(() => container.style.opacity = '1', 150);
                                });
                            }
                        }
                    }
                });
            };

            window.filterChart = function(type, btnElement) {
                // Update active tab UI
                document.querySelectorAll('.gvr-tabs button[data-type]').forEach(b => {
                    b.classList.remove('btn-outline-navy', 'active');
                    b.classList.add('btn-outline-gray');
                });
                btnElement.classList.remove('btn-outline-gray');
                btnElement.classList.add('btn-outline-navy', 'active');
                
                // Keep the current sorting!
                window.currentFilterType = type;
                renderErrorChart(type);
            };

            window.sortChart = function(btnElement) {
                if(window.currentSort === 'num') {
                    window.currentSort = 'er';
                    btnElement.innerHTML = '<i class="fas fa-sort-numeric-down"></i> 踰덊샇??;
                    btnElement.style.background = '#e3f2fd';
                    btnElement.style.color = '#1976d2';
                    btnElement.style.borderColor = '#1976d2';
                } else {
                    window.currentSort = 'num';
                    btnElement.innerHTML = '<i class="fas fa-sort-amount-down"></i> ?ㅻ떟瑜좎닚';
                    btnElement.style.background = '#f4f6f9';
                    btnElement.style.color = 'inherit';
                    btnElement.style.borderColor = '#ccc';
                }
                renderErrorChart(window.currentFilterType || 'ALL');
            };

            // Init
            window.currentFilterType = 'ALL';
            renderErrorChart('ALL');

            // Chart 2 (Right Top): 諛섎퀎 ?ㅻ떟 TOP 5 ?좏삎
            new Chart(document.getElementById('top5Chart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: ['異붾줎', '?낇빐??, '臾몃쾿', '?쇰━', '?댄쐶'],
                    datasets: [{
                        label: '?ㅻ떟瑜?(%)',
                        data: [40, 35, 15, 5, 5],
                        backgroundColor: '#4A89DC',
                        borderRadius: 2,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { min: 0, max: 100 } }
                }
            });

            // Chart 4 (Right Bottom): ?곸뿭蹂??뚯감蹂??깆쟻 異붿씠
            new Chart(document.getElementById('trendCompareChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: ['LC', 'GR', 'VO', 'RC'],
                    datasets: [
                        { label: 'AT1', data: [28, 45, 21, 18], backgroundColor: '#8BC34A', borderRadius: 2 },
                        { label: 'AT2', data: [27, 45, 25, 18], backgroundColor: '#4CAF50', borderRadius: 2 },
                        { label: 'AT3', data: [29, 45, 24, 19], backgroundColor: '#81D4FA', borderRadius: 2 },
                        { label: 'AT4', data: [29, 43, 24, 19], backgroundColor: '#29B6F6', borderRadius: 2 },
                        { label: 'AT5', data: [0, 46, 0, 20], backgroundColor: '#0288D1', borderRadius: 2 },
                        { label: 'AT6', data: [27, 0, 22, 0], backgroundColor: '#005792', borderRadius: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: {size: 10} } } },
                    scales: { y: { min: 0, max: 100 } }
                }
            });
        });
    </script>
